  <meta name="theme-color" content="#D45101">
  <meta name="mobile-web-app-capable" content="yes">

  <style>
    :root {
      /* ---- core palette: warm-dark instrument ---- */
      --brand: #D45101;            /* the only interactive accent */
      --brand-dim: #a23e02;
      --bg: #141210;               /* app background (given) */
      --surface: #1F1B17;          /* raised panels / headers */
      --surface-2: #29241f;        /* inputs, insets */
      --line: #36302A;             /* hairlines */
      --text: #F0EAE2;             /* primary (warm off-white) */
      --muted: #9A8F82;            /* units, secondary, labels */
      /* ---- state triad: verdict + progress only ---- */
      --go: #4E9D5B;
      --tight: #C6871D;
      --nogo: #C44231;
      /* ---- type ---- */
      --mono: ui-monospace, "SF Mono", SFMono-Regular, "Roboto Mono", Menlo, Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      /* ---- spacing / radius / motion ---- */
      --s1: 4px; --s2: 8px; --s3: 12px; --s4: 16px; --s5: 24px; --s6: 32px;
      --r1: 8px; --r2: 12px; --r3: 18px; --pill: 999px;
      --radius: var(--r2);
      --tap: 48px;
      --dur: 160ms;
      --ease: cubic-bezier(.2,.6,.2,1);
      --ring: 0 0 0 2px var(--bg), 0 0 0 4px var(--brand);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font: 15px/1.4 var(--sans);
      padding-bottom: calc(env(safe-area-inset-bottom) + 64px); /* room for tab bar */
      overscroll-behavior-y: contain;
      overflow-x: hidden;
    }
    button { font: inherit; color: inherit; cursor: pointer; }
    .num { font-family: var(--mono); font-variant-numeric: tabular-nums; }
    :focus-visible { outline: none; box-shadow: var(--ring); border-radius: var(--r1); }
    .label-cap { font-size: 12px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); }

    /* ---------- Sticky top bar ---------- */
    .topbar {
      position: sticky; top: 0; z-index: 40;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      padding: calc(env(safe-area-inset-top) + 8px) 12px 8px;
      box-shadow: 0 2px 10px rgba(0,0,0,.35);
    }
    .topbar-row { display: flex; align-items: center; gap: 10px; }
    .proj-btn {
      flex: 1 1 auto; min-width: 0;
      display: flex; align-items: center; gap: 6px;
      background: var(--surface-2); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 8px 12px; min-height: var(--tap);
      text-align: left; font-weight: 600;
    }
    .proj-btn .pname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .proj-btn .caret { color: var(--muted); margin-left: auto; }
    .total { text-align: right; flex: 0 0 auto; }
    .total .label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .total .amount { display: block; font-size: 22px; font-weight: 800; color: var(--brand); font-variant-numeric: tabular-nums; }

    .progress-wrap { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .progress-track { flex: 1; height: 8px; background: var(--surface-2); border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0; background: linear-gradient(90deg, var(--brand-dim), var(--brand)); border-radius: 999px; transition: width .2s ease; }
    .progress-text { font-size: 12px; color: var(--muted); flex: 0 0 auto; font-variant-numeric: tabular-nums; }

    .toolbar { display: flex; gap: 8px; margin-top: 8px; }
    .toolbar button {
      flex: 1; min-height: var(--tap);
      border-radius: var(--radius); border: 1px solid var(--line);
      background: var(--surface-2); font-weight: 600;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .toolbar button.primary { background: var(--brand); border-color: var(--brand); color: #fff; }
    .toolbar button:active { transform: translateY(1px); }

    /* ---------- Rooms ---------- */
    main { padding: 12px 12px 80px; max-width: 760px; margin: 0 auto; }
    .room {
      background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--radius); margin-bottom: 16px; overflow: hidden;
    }
    .room-head {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 14px; background: var(--surface-2);
      border-bottom: 1px solid var(--line);
    }
    .room-title { font-weight: 800; font-size: 17px; }
    .room-badge { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .room-sub { color: var(--brand); font-weight: 700; margin-left: auto; font-variant-numeric: tabular-nums; }
    .room-remove {
      background: transparent; border: 1px solid var(--line); border-radius: 8px;
      width: 34px; height: 34px; color: var(--muted); font-size: 18px; line-height: 1;
    }

    .group { border-bottom: 1px solid var(--line); }
    .group:last-child { border-bottom: 0; }
    .group-head {
      display: flex; align-items: center; gap: 10px;
      width: 100%; background: transparent; border: 0;
      padding: 12px 14px; min-height: var(--tap); text-align: left;
    }
    .group-chevron { color: var(--muted); transition: transform .15s ease; flex: 0 0 auto; }
    .group.collapsed .group-chevron { transform: rotate(-90deg); }
    .group-label { font-weight: 700; flex: 1 1 auto; min-width: 0; overflow-wrap: anywhere; }
    .group-meta { margin-left: auto; display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
    .group-sub { color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; }
    .group-sub.has { color: var(--brand); font-weight: 700; }
    .group-body { padding: 0 14px 6px; }
    .group.collapsed .group-body { display: none; }

    /* NAN toggle */
    .nan {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
      border: 1px solid var(--line); border-radius: 999px;
      padding: 4px 10px; min-height: 30px; background: transparent;
    }
    .nan.on { background: rgba(63,174,90,.15); border-color: var(--go); color: var(--go); }
    .nan .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; opacity: .6; }
    .nan.on .dot { opacity: 1; }

    /* item rows */
    .item { padding: 10px 0; border-top: 1px solid var(--line); }
    .group-body .item:first-child { border-top: 0; }
    .item-main { display: flex; align-items: flex-start; gap: 10px; }
    .chk {
      flex: 0 0 auto; width: 26px; height: 26px; margin-top: 2px;
      border-radius: 7px; border: 2px solid var(--line); background: var(--surface-2);
      display: grid; place-items: center; color: #fff; font-size: 16px; line-height: 1;
    }
    .item.checked .chk { background: var(--brand); border-color: var(--brand); }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-weight: 600; }
    .item-unit { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .item-unit .cost.over { color: var(--brand); font-weight: 700; }
    .price-edit {
      font: inherit; font-size: 11px; line-height: 1; color: var(--muted);
      background: transparent; border: 1px solid var(--line); border-radius: 999px;
      padding: 3px 8px; min-height: 24px; cursor: pointer;
    }
    .price-edit.on { color: var(--brand); border-color: var(--brand); }
    .item-line { flex: 0 0 auto; text-align: right; font-weight: 700; font-variant-numeric: tabular-nums; min-width: 64px; }
    .item.checked .item-line { color: var(--brand); }
    .item:not(.checked) .item-line { color: var(--muted); }
    .item-del {
      flex: 0 0 auto; width: 28px; height: 28px; border-radius: 8px;
      border: 1px solid var(--line); background: transparent; color: var(--muted);
      font-size: 13px; line-height: 1; cursor: pointer;
    }
    .item-del:active { background: var(--surface-2); }
    .add-custom {
      width: 100%; margin: 8px 0 4px; min-height: var(--tap);
      border: 1px dashed var(--line); border-radius: var(--radius);
      background: transparent; color: var(--brand); font-weight: 600; cursor: pointer;
    }
    .hidden-strip { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px 0; }
    .restore-chip {
      font-size: 12px; color: var(--muted); background: var(--surface-2);
      border: 1px solid var(--line); border-radius: 999px; padding: 5px 10px;
      min-height: 30px; cursor: pointer;
    }

    .item-controls { display: none; gap: 10px; align-items: center; margin-top: 8px; padding-left: 36px; flex-wrap: wrap; }
    .item.checked .item-controls { display: flex; }
    .qty-wrap { display: flex; align-items: center; gap: 4px; }
    .qty-wrap label { font-size: 12px; color: var(--muted); }
    input.qty {
      width: 84px; min-height: var(--tap); padding: 6px 8px;
      background: var(--surface-2); border: 1px solid var(--line); border-radius: 8px;
      color: var(--text); font: inherit; text-align: right; font-variant-numeric: tabular-nums;
    }
    .unit-cost { font-size: 12px; color: var(--muted); }
    .photo-btn {
      min-height: var(--tap); padding: 6px 14px; border-radius: 8px;
      border: 1px solid var(--brand); background: rgba(212,81,1,.12); color: var(--brand);
      font-weight: 600;
      display: inline-flex; align-items: center; gap: 6px; font-size: 14px;
    }
    .photo-btn:active { background: rgba(212,81,1,.22); }
    .scan-btn { border-color: var(--brand); color: var(--brand); background: var(--surface-2); }
    .group-hint { margin: 2px 0 8px; padding-left: 36px; font-size: 12px; color: var(--muted); }
    .note-in {
      width: 100%; margin-top: 8px; min-height: var(--tap); padding: 8px 10px;
      background: var(--surface-2); border: 1px solid var(--line); border-radius: 8px;
      color: var(--text); font: inherit;
    }
    .thumbs { display: flex; gap: 8px; flex-wrap: wrap; width: 100%; margin-top: 8px; padding-left: 36px; }
    .thumb { position: relative; width: 64px; height: 64px; border-radius: 8px; overflow: hidden; border: 1px solid var(--line); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb .rm {
      position: absolute; top: 2px; right: 2px; width: 20px; height: 20px;
      border-radius: 50%; background: rgba(0,0,0,.7); border: 0; color: #fff;
      font-size: 13px; line-height: 20px; padding: 0; display: grid; place-items: center;
    }

    /* ---------- Modal / sheet ---------- */
    .scrim { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 50; display: none; }
    .scrim.open { display: block; }
    .sheet {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 51;
      background: var(--surface); border-top-left-radius: 18px; border-top-right-radius: 18px;
      border-top: 1px solid var(--line); padding: 16px 16px calc(env(safe-area-inset-bottom) + 16px);
      transform: translateY(100%); transition: transform .22s ease; max-height: 85vh; overflow: auto;
      max-width: 760px; margin: 0 auto;
    }
    .sheet.open { transform: translateY(0); }
    .sheet h2 { margin: 0 0 12px; font-size: 18px; }
    .sheet-grab { width: 40px; height: 4px; background: var(--line); border-radius: 999px; margin: 0 auto 12px; }
    .proj-list { list-style: none; margin: 0 0 12px; padding: 0; }
    .proj-list li { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--line); }
    .proj-list .pick { flex: 1; text-align: left; background: transparent; border: 0; padding: 10px 0; min-height: var(--tap); font-weight: 600; }
    .proj-list .pick.active { color: var(--brand); }
    .proj-list .mini { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--line); background: var(--surface-2); }
    .proj-tools { margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--line); }
    .proj-tools .btn-ghost { width: 100%; }
    .proj-tools-note { margin: 8px 0 0; font-size: 12px; color: var(--muted); }
    .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .type-grid button {
      min-height: 64px; border-radius: var(--radius); border: 1px solid var(--line);
      background: var(--surface-2); font-weight: 700; font-size: 16px;
    }
    .field { display: block; margin: 10px 0; }
    .field span { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    .field input {
      width: 100%; min-height: var(--tap); padding: 8px 10px; font: inherit; color: var(--text);
      background: var(--surface-2); border: 1px solid var(--line); border-radius: 8px;
    }
    .btn-primary {
      width: 100%; min-height: var(--tap); margin-top: 8px; border-radius: var(--radius);
      background: var(--brand); border: 1px solid var(--brand); color: #fff; font-weight: 700; font-size: 16px;
    }
    .btn-ghost {
      width: 100%; min-height: var(--tap); margin-top: 8px; border-radius: var(--radius);
      background: transparent; border: 1px solid var(--line); color: var(--text); font-weight: 600;
    }

    /* deal analyzer */
    .deal-verdict {
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
      padding: 14px; margin-bottom: 8px; border-radius: var(--radius);
      background: var(--surface-2); border: 1px solid var(--line);
    }
    .deal-chip {
      font-weight: 800; font-size: 13px; letter-spacing: .04em; padding: 6px 12px;
      border-radius: 999px; background: var(--line); color: var(--text); white-space: nowrap;
    }
    .deal-chip.go { background: #1f7a3d; color: #fff; }
    .deal-chip.tight { background: #b5791a; color: #fff; }
    .deal-chip.nogo { background: #9a2b22; color: #fff; }
    .deal-headline { display: flex; flex-direction: column; }
    .deal-headline-label { font-size: 12px; color: var(--muted); }
    .deal-headline-amt { font-size: 28px; font-weight: 800; font-variant-numeric: tabular-nums; }
    .deal-row { display: flex; gap: 10px; }
    .deal-row .field { flex: 1; }
    .deal-out { margin: 6px 0 4px; padding: 0; }
    .deal-out div { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
    .deal-out dt { color: var(--muted); }
    .deal-out dd { margin: 0; font-weight: 700; font-variant-numeric: tabular-nums; }

    /* toast */
    .toast {
      position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(20px);
      background: var(--surface-2); border: 1px solid var(--line); color: var(--text);
      padding: 10px 16px; border-radius: 999px; z-index: 60; opacity: 0; pointer-events: none;
      transition: opacity .2s ease, transform .2s ease; font-size: 14px; max-width: 90vw; text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ============================================================
       REDESIGN v2 — room-first drill-down + persistent deal readout
       ============================================================ */

    /* ---- persistent top: project row + deal readout + progress ---- */
    .proj-row { display: flex; align-items: center; gap: var(--s2); }
    .brand-mark { flex: 0 0 auto; width: 32px; height: 32px; border-radius: 8px; display: block; }
    .readout {
      display: flex; align-items: stretch; gap: var(--s3); margin-top: var(--s3);
      background: var(--bg); border: 1px solid var(--line); border-radius: var(--r2);
      padding: var(--s3) var(--s4);
    }
    .readout-total { flex: 1 1 auto; min-width: 0; }
    .readout-total .amount { display: block; font-size: 30px; font-weight: 800; color: var(--text); line-height: 1.02; }
    .readout-verdict {
      flex: 0 0 auto; display: flex; flex-direction: column; align-items: flex-end; justify-content: center;
      gap: 3px; padding-left: var(--s3); border-left: 1px solid var(--line);
    }
    .verdict-chip {
      font-weight: 800; font-size: 13px; letter-spacing: .05em; padding: 5px 12px;
      border-radius: var(--pill); background: var(--surface-2); color: var(--muted); white-space: nowrap;
      border: 1px solid var(--line);
    }
    .verdict-chip.go   { background: var(--go);   color: #06140a; border-color: transparent; }
    .verdict-chip.tight{ background: var(--tight);color: #1c1304; border-color: transparent; }
    .verdict-chip.nogo { background: var(--nogo); color: #fff;     border-color: transparent; }
    .readout-bid { font-size: 12px; color: var(--muted); }
    .readout-bid b { color: var(--text); font-weight: 700; }

    .progress-wrap { display: flex; align-items: center; gap: var(--s2); margin-top: var(--s3); }
    .progress-track { flex: 1; height: 6px; background: var(--surface-2); border-radius: var(--pill); overflow: hidden; }
    .progress-fill { height: 100%; width: 0; background: var(--brand); border-radius: var(--pill); transition: width var(--dur) var(--ease); }
    .progress-text { font-size: 12px; color: var(--muted); flex: 0 0 auto; }

    /* ---- view panels ---- */
    .panel { display: none; padding: var(--s4) var(--s3) var(--s5); max-width: 760px; margin: 0 auto; }
    .panel.active { display: block; }

    /* ---- search ---- */
    .search-wrap { position: relative; margin-bottom: var(--s4); }
    .search-wrap input {
      width: 100%; min-height: var(--tap); padding: 10px 38px 10px 38px;
      background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--r2);
      color: var(--text); font: inherit;
    }
    .search-wrap .s-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    .search-wrap .s-clear {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      width: 34px; height: 34px; border: 0; background: transparent; color: var(--muted); font-size: 18px;
    }

    /* ---- room overview cards ---- */
    .overview-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: var(--s3); }
    .overview-head h2 { margin: 0; font-size: 17px; font-weight: 700; }
    .overview-head .sub { font-size: 12px; color: var(--muted); }
    .room-cards { display: flex; flex-direction: column; gap: var(--s2); }
    .room-card {
      display: block; width: 100%; text-align: left;
      background: var(--surface); border: 1px solid var(--line); border-radius: var(--r2);
      padding: var(--s4); min-height: var(--tap); transition: border-color var(--dur) var(--ease);
    }
    .room-card:active { border-color: var(--brand); }
    .room-card-top { display: flex; align-items: baseline; justify-content: space-between; gap: var(--s3); }
    .room-card-name { font-size: 16px; font-weight: 700; }
    .room-card-amt { font-size: 18px; font-weight: 800; color: var(--brand); }
    .room-card:not(.has-cost) .room-card-amt { color: var(--muted); }
    .room-card-meta { display: flex; align-items: center; gap: var(--s3); margin-top: var(--s2); }
    .room-card-bar { flex: 1; height: 5px; background: var(--surface-2); border-radius: var(--pill); overflow: hidden; }
    .room-card-bar i { display: block; height: 100%; background: var(--brand); border-radius: var(--pill); }
    .room-card-prog { font-size: 12px; color: var(--muted); flex: 0 0 auto; }
    .room-card .chev { color: var(--muted); margin-left: var(--s2); }

    .add-room-btn {
      width: 100%; min-height: var(--tap); margin-top: var(--s3); border-radius: var(--r2);
      border: 1px dashed var(--line); background: transparent; color: var(--brand); font-weight: 700;
    }
    .add-room-btn:active { background: var(--surface); }

    /* ---- room detail header (drill-down) ---- */
    .detail-head { display: flex; align-items: center; gap: var(--s2); margin-bottom: var(--s4); }
    .back-btn {
      display: inline-flex; align-items: center; gap: 4px; min-height: 40px; padding: 0 12px 0 6px;
      background: var(--surface); border: 1px solid var(--line); border-radius: var(--pill); color: var(--text); font-weight: 600;
    }
    .detail-head .dh-name { font-size: 18px; font-weight: 800; flex: 1; min-width: 0; }
    .detail-head .dh-amt { font-size: 18px; font-weight: 800; color: var(--brand); }

    /* ---- empty states ---- */
    .empty {
      text-align: center; color: var(--muted); padding: var(--s6) var(--s4);
      border: 1px dashed var(--line); border-radius: var(--r2); font-size: 14px; line-height: 1.5;
    }
    .empty b { color: var(--text); display: block; margin-bottom: 4px; font-size: 15px; }

    /* ---- bottom tab bar ---- */
    .tabbar {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 45;
      display: flex; background: var(--surface); border-top: 1px solid var(--line);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .tabbar button {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
      min-height: 56px; background: transparent; border: 0; color: var(--muted); font-size: 11px; font-weight: 600;
    }
    .tabbar button .ic { font-size: 19px; line-height: 1; }
    .tabbar button.active { color: var(--brand); }
    .tabbar button.active .ic { transform: translateY(-1px); }

    /* ---- deal panel (Deal tab) ---- */
    .deal-hero {
      text-align: center; background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--r2); padding: var(--s5) var(--s4); margin-bottom: var(--s4);
    }
    .deal-hero .verdict-chip { font-size: 15px; padding: 7px 18px; }
    .deal-hero .dh-label { display: block; margin-top: var(--s3); }
    .deal-hero .dh-amt { display: block; font-size: 34px; font-weight: 800; margin-top: 2px; }

    /* ---- groups become standalone cards in the drill-down ---- */
    #rooms .group {
      background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--r2); margin-bottom: var(--s2); overflow: hidden;
    }
    #rooms .group:last-child { border-bottom: 1px solid var(--line); }
    .group-count { font-size: 12px; color: var(--muted); }
    .group-sub.has { color: var(--brand); font-weight: 700; }
    #rooms .nan { margin: 0 14px 12px; }
    .group.collapsed .nan { margin-top: 2px; }

    /* ---- whole-row tap target ---- */
    .item { cursor: pointer; border-radius: var(--r1); }
    .item:focus-visible { box-shadow: var(--ring); }
    .item .chk { transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease); }
    .item-name { font-size: 15px; }
    .item-line { font-family: var(--mono); }

    /* ---- summary tab ---- */
    .summary-card {
      background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--r2); padding: var(--s2) var(--s4); margin-bottom: var(--s4);
    }
    .summary-row { display: flex; justify-content: space-between; align-items: center; gap: var(--s3); padding: 11px 0; border-bottom: 1px solid var(--line); }
    .summary-row:last-child { border-bottom: 0; }
    .summary-row .num { font-weight: 700; }
    .summary-row.total { font-weight: 800; }
    .summary-row.total .num { color: var(--brand); font-size: 18px; }
    .export-cta { font-size: 16px; }

    /* deal output list spacing in the panel */
    #panelDeal .deal-out div:last-child { border-bottom: 0; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="proj-row">
      <img class="brand-mark" src="./assets/icon-180.png" alt="Spark Homes" width="32" height="32">
      <button class="proj-btn" id="projBtn" aria-haspopup="dialog">
        <span class="pname" id="projName">Project</span>
        <span class="caret" aria-hidden="true">▾</span>
      </button>
    </div>

    <!-- Signature element: live repair total + deal verdict, persistent on every tab -->
    <div class="readout">
      <div class="readout-total">
        <span class="label-cap">Repair total</span>
        <span class="amount num" id="runningTotal">$0</span>
      </div>
      <div class="readout-verdict">
        <span class="verdict-chip" id="readoutChip">Set ARV</span>
        <span class="readout-bid" id="readoutBid">max bid <b class="num">—</b></span>
      </div>
    </div>

    <div class="progress-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" id="progressBar">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <span class="progress-text num" id="progressText">0%</span>
    </div>
  </header>

  <main id="view">
    <!-- Rooms tab: search + room overview / room drill-down -->
    <section class="panel active" id="panelRooms" role="tabpanel" aria-label="Rooms">
      <div class="search-wrap">
        <span class="s-icon" aria-hidden="true"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg></span>
        <input id="searchInput" type="search" inputmode="search" placeholder="Search all items…" aria-label="Search all items">
        <button class="s-clear" id="searchClear" aria-label="Clear search" hidden>✕</button>
      </div>
      <div id="rooms" aria-live="polite"></div>
    </section>

    <!-- Deal tab -->
    <section class="panel" id="panelDeal" role="tabpanel" aria-label="Deal analyzer">
      <div class="deal-hero">
        <span class="verdict-chip" id="dealChip">—</span>
        <span class="label-cap dh-label" id="dealBigLabel">Max allowable bid</span>
        <span class="dh-amt num" id="dealBigAmt">$0</span>
      </div>
      <label class="field"><span>After-repair value (ARV)</span>
        <input id="dealArv" type="number" inputmode="decimal" min="0" placeholder="e.g. 250000"></label>
      <label class="field"><span>Purchase price (optional)</span>
        <input id="dealPurchase" type="number" inputmode="decimal" min="0" placeholder="what you'd pay"></label>
      <div class="deal-row">
        <label class="field"><span>Target margin %</span>
          <input id="dealMargin" type="number" inputmode="decimal" min="0" placeholder="20"></label>
        <label class="field"><span>Holding + closing %</span>
          <input id="dealHolding" type="number" inputmode="decimal" min="0" placeholder="10"></label>
      </div>
      <dl class="deal-out" id="dealOut"></dl>
    </section>

    <!-- Summary tab: review everything, then export -->
    <section class="panel" id="panelSummary" role="tabpanel" aria-label="Summary and export">
      <div id="summaryBody"></div>
    </section>
  </main>

  <nav class="tabbar" role="tablist" aria-label="Modes">
    <button id="tabRooms" class="active" role="tab" aria-selected="true"><span class="ic" aria-hidden="true">▦</span>Rooms</button>
    <button id="tabDeal" role="tab" aria-selected="false"><span class="ic" aria-hidden="true">◷</span>Deal</button>
    <button id="tabSummary" role="tab" aria-selected="false"><span class="ic" aria-hidden="true">⤓</span>Summary</button>
  </nav>

  <!-- Project sheet -->
  <div class="scrim" id="projScrim"></div>
  <div class="sheet" id="projSheet" role="dialog" aria-label="Projects">
    <div class="sheet-grab"></div>
    <h2>Projects</h2>
    <ul class="proj-list" id="projList"></ul>
    <button class="btn-primary" id="newProjBtn">＋ New project</button>
    <div class="proj-tools">
      <button class="btn-ghost" id="importCsvBtn">Update standard prices (CSV)</button>
      <input type="file" id="csvInput" accept=".csv,text/csv" hidden>
      <p class="proj-tools-note" id="globalPriceNote"></p>
    </div>
  </div>

  <!-- Add-room sheet -->
  <div class="scrim" id="roomScrim"></div>
  <div class="sheet" id="roomSheet" role="dialog" aria-label="Add a room">
    <div class="sheet-grab"></div>
    <h2>Add a room</h2>
    <div class="type-grid" id="roomTypeGrid"></div>
    <button class="btn-ghost" id="roomCancel">Cancel</button>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Heavy libs via CDN, cached by the service worker for offline use -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
